name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Configure CMake
      run: cmake -B build -S .


    - name: Build
      run: cmake --build build --config Release


    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Launcher-EXE
        path: build/Release/*.exe
